<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Cafe | Premium Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafafa; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .active-cat { background-color: #1a1a1a !important; color: white !important; transform: scale(1.05); }
        .item-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .item-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .animate-fade { animation: slideIn 0.5s ease forwards; }
        .animate-slideUp { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <div id="order-sent-banner" class="hidden fixed top-8 left-1/2 -translate-x-1/2 z-[200] w-[90%] max-w-sm">
        <div class="bg-zinc-900 text-white p-5 rounded-3xl shadow-2xl flex items-center gap-4 border border-white/10">
            <div class="h-10 w-10 bg-orange-500 rounded-full flex items-center justify-center text-xl">👨‍🍳</div>
            <div>
                <p class="font-bold text-sm">Order Sent!</p>
                <p class="text-[10px] text-zinc-400">Kitchen has received your request.</p>
            </div>
        </div>
    </div>

    <div id="ready-banner" class="hidden fixed top-8 left-1/2 -translate-x-1/2 z-[200] w-[90%] max-w-sm">
        <div class="bg-indigo-600 text-white p-5 rounded-3xl shadow-2xl flex items-center gap-4 border border-white/10">
            <div class="h-10 w-10 bg-white rounded-full flex items-center justify-center text-xl">🛎️</div>
            <div>
                <p class="font-bold text-sm">Ready to Collect!</p>
                <p class="text-[10px] text-indigo-100">Pick up your order at the counter.</p>
            </div>
        </div>
    </div>

    <div id="silent-popup" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[150] animate-slideUp">
        <div class="bg-zinc-900/90 backdrop-blur-md text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-2 border border-white/10">
            <span class="text-green-400 text-lg">✔</span> 
            <span class="text-[10px] font-black uppercase tracking-[0.2em]">Added to Basket</span>
        </div>
    </div>

    <header class="glass-header sticky top-0 z-50 border-b border-zinc-100">
        <div class="max-w-7xl mx-auto px-5 h-20 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-2xl font-extrabold tracking-tighter text-zinc-900 italic leading-none">COZY</span>
                <span class="text-[8px] font-black tracking-[0.5em] text-orange-500 uppercase">Cafe</span>
            </div>
            <button onclick="toggleCart(true)" class="relative p-3 bg-zinc-900 text-white rounded-2xl hover:bg-zinc-800 transition-colors shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[9px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white font-bold">0</span>
            </button>
        </div>
    </header>

    <section id="customer-panel" class="max-w-7xl mx-auto px-5 py-8">
        <div id="customer-order-status" class="mb-10 hidden">
            <h3 class="text-xs font-black uppercase tracking-widest text-zinc-400 mb-4">Your Active Orders</h3>
            <div id="status-list" class="flex flex-col gap-3"></div>
        </div>
        <div class="flex gap-4 overflow-x-auto no-scrollbar mb-10 pb-2">
             <button onclick="filterMenu('All')" class="cat-btn active-cat px-6 py-2 rounded-full bg-white text-gray-500 font-bold shadow-sm border border-gray-100 whitespace-nowrap">All Items</button>
             <button onclick="filterMenu('Coffee')" class="cat-btn px-6 py-2 rounded-full bg-white text-gray-500 font-bold shadow-sm border border-gray-100 whitespace-nowrap">Coffee</button>
             <button onclick="filterMenu('Pizza')" class="cat-btn px-6 py-2 rounded-full bg-white text-gray-500 font-bold shadow-sm border border-gray-100 whitespace-nowrap">Pizza/Sides</button>
             <button onclick="filterMenu('Burger')" class="cat-btn px-6 py-2 rounded-full bg-white text-gray-500 font-bold shadow-sm border border-gray-100 whitespace-nowrap">Burger</button>
             <button onclick="filterMenu('Pasta')" class="cat-btn px-6 py-2 rounded-full bg-white text-gray-500 font-bold shadow-sm border border-gray-100 whitespace-nowrap">Pasta</button>
             <button onclick="filterMenu('Shakes')" class="cat-btn px-6 py-2 rounded-full bg-white text-gray-500 font-bold shadow-sm border border-gray-100 whitespace-nowrap">Shakes</button>
        </div>
        <main id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></main>
    </section>

    <section id="admin-login-panel" class="hidden max-w-md mx-auto px-5 py-20">
        <div class="bg-white p-10 rounded-[40px] border border-zinc-100 shadow-2xl">
            <h2 class="text-2xl font-black mb-8 italic text-center text-zinc-900">Admin Login</h2>
            <div class="space-y-4">
                <input type="text" id="admin-id" placeholder="ID" class="w-full bg-zinc-50 p-4 rounded-2xl border border-zinc-100 outline-none focus:border-zinc-900 font-bold transition-all">
                <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-zinc-50 p-4 rounded-2xl border border-zinc-100 outline-none focus:border-zinc-900 font-bold transition-all">
                <button onclick="handleLogin()" class="w-full bg-zinc-900 text-white py-4 rounded-2xl font-bold">Login</button>
            </div>
        </div>
    </section>

    <section id="admin-panel" class="hidden max-w-5xl mx-auto px-5 py-10">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-4xl font-extrabold text-zinc-900 tracking-tight">Orders</h2>
                <p class="text-zinc-500 font-medium">Real-time kitchen management</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <div class="bg-orange-100 text-orange-600 px-4 py-2 rounded-xl font-bold text-sm" id="admin-count">0 Orders</div>
                <button onclick="location.hash=''" class="text-[10px] font-black uppercase text-zinc-400">Exit Admin</button>
            </div>
        </div>
        <div id="admin-orders-list" class="grid gap-6"></div>
    </section>

    <div id="cart-sidebar-overlay" class="hidden fixed inset-0 bg-zinc-900/60 z-[100] backdrop-blur-md transition-all" onclick="toggleCart(false)">
        <div id="cart-sidebar" class="absolute right-0 top-0 h-full w-full sm:w-[450px] bg-white shadow-2xl flex flex-col translate-x-full transition-transform duration-500" onclick="event.stopPropagation()">
            <div class="p-8 border-b flex justify-between items-center">
                <h2 class="text-2xl font-black">My Basket</h2>
                <button onclick="toggleCart(false)" class="p-2 hover:bg-zinc-100 rounded-full text-2xl">&times;</button>
            </div>
            <div id="cart-content" class="flex-grow overflow-y-auto p-8 space-y-8"></div>
            <div class="p-8 bg-zinc-50 border-t">
                <div class="mb-6">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-2">Customer Name</label>
                    <input type="text" id="cust-name" placeholder="Guest Name" class="w-full bg-white p-4 rounded-2xl border border-zinc-200 focus:border-zinc-900 outline-none font-bold transition-all shadow-sm">
                </div>
                <div class="flex justify-between items-center mb-8">
                    <span class="font-bold text-zinc-400 uppercase text-xs tracking-widest">Total Bill</span>
                    <span id="cart-total-price" class="text-4xl font-black text-zinc-900">₹0</span>
                </div>
                <button onclick="sendOrder()" class="w-full bg-zinc-900 text-white py-5 rounded-2xl font-bold text-lg hover:shadow-xl active:scale-[0.98] transition-all">Send to Kitchen</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const SUPABASE_URL = 'https://bjymgwhthvwwupbisnpw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqeW1nd2h0aHZ3d3VwYmlzbnB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxNzc4MjMsImV4cCI6MjA4Mjc1MzgyM30.B3cp2YE1iYF1m7OxuzlN0NRLSzjzopgCzAI9450m_nw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const menu = [
            { id: 1, name: 'Classic Espresso', price: 120, cat: 'Coffee', img: 'https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=500' }, { id: 2, name: 'Iced Caramel Latte', price: 210, cat: 'Coffee', img: 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=500' }, { id: 3, name: 'Hot Cappuccino', price: 180, cat: 'Coffee', img: 'https://images.unsplash.com/photo-1534778101976-62847782c213?w=500' }, { id: 4, name: 'Paneer Tikka Sandwich', price: 190, cat: 'Pizza', img: 'https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=500' }, { id: 5, name: 'Paneer Tikka Pizza', price: 420, cat: 'Pizza', img: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500' }, { id: 6, name: 'Pepperoni Blast', price: 480, cat: 'Pizza', img: 'https://images.unsplash.com/photo-1628840042765-356cda07504e?w=500' }, { id: 7, name: 'Crispy Veg Burger', price: 150, cat: 'Burger', img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=500' }, { id: 8, name: 'Double Cheese Burger', price: 250, cat: 'Burger', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500' }, { id: 9, name: 'Creamy Pink Pasta', price: 290, cat: 'Pasta', img: 'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=500' }, { id: 10, name: 'Spicy Red Pasta', price: 260, cat: 'Pasta', img: 'https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=500' }, { id: 11, name: 'KitKat Shake', price: 190, cat: 'Shakes', img: 'https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=500' }, { id: 12, name: 'Oreo Choco Shake', price: 200, cat: 'Shakes', img: 'https://images.unsplash.com/photo-1532713031318-db2d14e4b3e1?w=500' } 
        ];

        let cart = [];
        let orders = [];
        let isAdminLoggedIn = false;

        const sentSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const readySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        window.addEventListener('hashchange', checkRoute);
        window.addEventListener('load', () => {
            renderMenu(menu);
            checkRoute();
            fetchOrders();
            setInterval(fetchOrders, 4000); 
        });

        async function fetchOrders() {
            const { data, error } = await _supabase.from('orders').select('*').order('id', { ascending: false });
            if (!error && data) {
                data.forEach(newO => {
                    const oldO = orders.find(o => o.id === newO.id);
                    // Notification Logic Modified: Show only if NOT Admin
                    if (oldO && oldO.status === 'Pending' && newO.status === 'Ready' && !isAdminLoggedIn) { 
                        readySound.play().catch(e => {});
                        const banner = document.getElementById('ready-banner');
                        banner.classList.remove('hidden');
                        setTimeout(() => banner.classList.add('hidden'), 4000);
                    }
                });
                orders = data;
                renderCustomerStatus();
                if(isAdminLoggedIn) renderAdmin();
            }
        }

        async function sendOrder() {
            const nameInput = document.getElementById('cust-name');
            const name = nameInput.value.trim();
            
            if(!name || cart.length === 0) {
                alert("Please enter your name and add items to the basket.");
                return;
            }
            
            const itemsText = cart.map(it => `${it.name} x${it.qty}${it.note ? ` (${it.note})` : ''}`).join(', ');
            const totalQty = cart.reduce((s,i) => s + i.qty, 0);

            // Supabase insertion
            const { error } = await _supabase.from('orders').insert([
                {
                    customer_name: name, // If DB error, change to 'custumer_name'
                    item_name: itemsText,
                    quantity: totalQty,
                    status: 'Pending'
                }
            ]);

            if (error) {
                console.error("Error sending order:", error);
                alert("Order failed! Error: " + error.message);
            } else {
                sentSound.play().catch(e => {});
                cart = []; 
                nameInput.value = ""; 
                updateUI(); 
                toggleCart(false);
                const banner = document.getElementById('order-sent-banner');
                banner.classList.remove('hidden');
                setTimeout(() => banner.classList.add('hidden'), 3000);
                fetchOrders();
            }
        }

        async function updateOrderStatus(id, newStatus) {
            await _supabase.from('orders').update({ status: newStatus }).eq('id', id);
            fetchOrders();
        }

        function checkRoute() {
            const h = window.location.hash;
            const cPanel = document.getElementById('customer-panel');
            const aLogin = document.getElementById('admin-login-panel');
            const aDashboard = document.getElementById('admin-panel');

            if (h === '#admin') {
                cPanel.classList.add('hidden');
                if (isAdminLoggedIn) {
                    aLogin.classList.add('hidden');
                    aDashboard.classList.remove('hidden');
                    renderAdmin();
                } else {
                    aLogin.classList.remove('hidden');
                    aDashboard.classList.add('hidden');
                }
            } else {
                cPanel.classList.remove('hidden');
                aLogin.classList.add('hidden');
                aDashboard.classList.add('hidden');
            }
            renderCustomerStatus();
        }

        function handleLogin() {
            const id = document.getElementById('admin-id').value;
            const pass = document.getElementById('admin-pass').value;
            if (id === 'admin' && pass === '1234') {
                isAdminLoggedIn = true;
                checkRoute();
            } else { alert("Incorrect Admin Credentials"); }
        }

        function renderMenu(items) {
            document.getElementById('menu-grid').innerHTML = items.map(item => `
                <div class="item-card bg-white rounded-[32px] p-4 border border-zinc-100 shadow-sm animate-fade">
                    <img src="${item.img}" class="h-48 w-full object-cover rounded-[24px] mb-4">
                    <div class="px-2">
                        <p class="text-[10px] font-bold text-orange-500 uppercase tracking-widest mb-1">${item.cat}</p>
                        <h3 class="font-extrabold text-lg text-zinc-900 mb-4">${item.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-bold">₹${item.price}</span>
                            <button onclick="addToCart(${item.id})" class="h-12 w-12 bg-zinc-900 text-white rounded-2xl flex items-center justify-center hover:bg-zinc-800 transition-all active:scale-90 shadow-lg">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = menu.find(m => m.id === id);
            const exist = cart.find(c => c.id === id);
            if(exist) exist.qty++; else cart.push({...item, qty: 1, note: ''});
            updateUI();
            const pop = document.getElementById('silent-popup');
            pop.classList.remove('hidden');
            setTimeout(() => pop.classList.add('hidden'), 2000);
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.reduce((s,i) => s + i.qty, 0);
            document.getElementById('cart-content').innerHTML = cart.map((item, i) => `
                <div class="flex flex-col gap-4 border-b border-zinc-50 pb-6">
                    <div class="flex gap-4 items-center">
                        <img src="${item.img}" class="w-20 h-20 rounded-2xl object-cover shadow-sm">
                        <div class="flex-grow">
                            <h4 class="font-bold text-zinc-900">${item.name}</h4>
                            <div class="flex items-center gap-4 mt-2">
                                <button onclick="changeQty(${i},-1)" class="w-8 h-8 rounded-lg bg-zinc-100 flex items-center justify-center font-bold">-</button>
                                <span class="text-sm font-black">${item.qty}</span>
                                <button onclick="changeQty(${i},1)" class="w-8 h-8 rounded-lg bg-zinc-900 text-white flex items-center justify-center font-bold">+</button>
                            </div>
                        </div>
                        <p class="font-black text-zinc-900">₹${item.price * item.qty}</p>
                    </div>
                    <input type="text" placeholder="Extra info" onchange="cart[${i}].note=this.value" value="${item.note || ''}" class="bg-zinc-100 p-3 rounded-xl text-[10px] font-bold outline-none focus:bg-orange-50">
                </div>
            `).join('');
            document.getElementById('cart-total-price').innerText = `₹${cart.reduce((s,i) => s + (i.price*i.qty), 0)}`;
        }

        function changeQty(i, d) { cart[i].qty += d; if(cart[i].qty < 1) cart.splice(i, 1); updateUI(); }
        
        function toggleCart(s) {
            const overlay = document.getElementById('cart-sidebar-overlay');
            const sidebar = document.getElementById('cart-sidebar');
            if(s) { overlay.classList.remove('hidden'); setTimeout(() => sidebar.style.transform = 'translateX(0)', 10); } 
            else { sidebar.style.transform = 'translateX(100%)'; setTimeout(() => overlay.classList.add('hidden'), 500); }
        }

        function renderCustomerStatus() {
            const container = document.getElementById('customer-order-status');
            const list = document.getElementById('status-list');
            const activeOrders = orders.filter(o => o.status !== 'Completed');
            if(activeOrders.length > 0) {
                container.classList.remove('hidden');
                list.innerHTML = activeOrders.map(o => `
                    <div class="bg-white border border-zinc-100 p-4 rounded-2xl shadow-sm flex justify-between items-center animate-fade">
                        <div>
                            <p class="text-[10px] font-black text-zinc-400 uppercase">Order #ORD-${o.id}</p>
                            <p class="font-bold text-zinc-800">${o.customer_name}, your order is ${o.status}</p>
                        </div>
                        <div class="px-4 py-2 rounded-full text-[10px] font-black uppercase ${o.status === 'Ready' ? 'bg-green-100 text-green-600 animate-pulse' : 'bg-orange-100 text-orange-600'}">
                            ${o.status === 'Ready' ? 'Pick up now' : 'Cooking'}
                        </div>
                    </div>
                `).join('');
            } else { container.classList.add('hidden'); }
        }

        function renderAdmin() {
            const active = orders.filter(o => o.status !== 'Completed');
            document.getElementById('admin-count').innerText = `${active.length} Active`;
            document.getElementById('admin-orders-list').innerHTML = orders.map((o) => `
                <div class="bg-white p-8 rounded-[32px] border border-zinc-100 shadow-sm flex flex-col md:flex-row justify-between items-start gap-6 animate-fade">
                    <div class="flex-grow">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-[10px] font-black px-3 py-1 bg-zinc-100 rounded-full">#ORD-${o.id}</span>
                            <span class="text-[10px] font-black px-3 py-1 ${o.status === 'Ready' ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'} rounded-full uppercase">${o.status}</span>
                        </div>
                        <h4 class="text-2xl font-black mb-4">${o.customer_name}</h4>
                        <div class="text-sm font-medium text-zinc-500">${o.item_name}</div>
                    </div>
                    ${o.status === 'Pending' ? `
                        <button onclick="updateOrderStatus(${o.id}, 'Ready')" class="w-full md:w-auto bg-zinc-900 text-white px-8 py-4 rounded-2xl font-bold">Mark Ready</button>
                    ` : (o.status === 'Ready' ? `
                        <button onclick="updateOrderStatus(${o.id}, 'Completed')" class="w-full md:w-auto bg-green-600 text-white px-8 py-4 rounded-2xl font-bold">Complete</button>
                    ` : `<div class="text-zinc-400 font-bold px-4 py-2 border border-zinc-100 rounded-xl">Done ✓</div>`)}
                </div>
            `).join('');
        }
        
        function filterMenu(c) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
            event.target.classList.add('active-cat');
            renderMenu(c === 'All' ? menu : menu.filter(m => m.cat === c));
        }
    </script>
</body>
</html>
