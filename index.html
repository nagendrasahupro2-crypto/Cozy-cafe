<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Cafe | Premium Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafafa; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .active-cat { background-color: #1a1a1a !important; color: white !important; transform: scale(1.05); }
        .item-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .item-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .animate-fade { animation: slideIn 0.5s ease forwards; }
        .animate-slideUp { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <div id="order-sent-banner" class="hidden fixed top-8 left-1/2 -translate-x-1/2 z-[200] w-[90%] max-w-sm">
        <div class="bg-zinc-900 text-white p-5 rounded-3xl shadow-2xl flex items-center gap-4 border border-white/10">
            <div class="h-10 w-10 bg-orange-500 rounded-full flex items-center justify-center text-xl">👨‍🍳</div>
            <div><p class="font-bold text-sm">Order Sent!</p><p class="text-[10px] text-zinc-400">Kitchen has received your request.</p></div>
        </div>
    </div>

    <div id="ready-banner" class="hidden fixed top-8 left-1/2 -translate-x-1/2 z-[200] w-[90%] max-w-sm">
        <div class="bg-indigo-600 text-white p-5 rounded-3xl shadow-2xl flex items-center gap-4 border border-white/10">
            <div class="h-10 w-10 bg-white rounded-full flex items-center justify-center text-xl">🛎️</div>
            <div><p class="font-bold text-sm">Ready to Collect!</p><p class="text-[10px] text-indigo-100">Pick up your order at the counter.</p></div>
        </div>
    </div>

    <div id="silent-popup" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[150] animate-slideUp">
        <div class="bg-zinc-900/90 backdrop-blur-md text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-2 border border-white/10">
            <span class="text-green-400 text-lg">✔</span> <span class="text-[10px] font-black uppercase tracking-[0.2em]">Added to Basket</span>
        </div>
    </div>

    <header class="glass-header sticky top-0 z-50 border-b border-zinc-100">
        <div class="max-w-7xl mx-auto px-5 h-20 flex justify-between items-center">
            <div class="flex flex-col"><span class="text-2xl font-extrabold tracking-tighter text-zinc-900 italic leading-none">COZY</span><span class="text-[8px] font-black tracking-[0.5em] text-orange-500 uppercase">Cafe</span></div>
            <button id="cart-trigger-btn" onclick="toggleCart(true)" class="relative p-3 bg-zinc-900 text-white rounded-2xl shadow-lg transition-transform active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[9px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white font-bold">0</span>
            </button>
        </div>
    </header>

    <section id="customer-panel" class="max-w-7xl mx-auto px-5 py-8">
        <div id="customer-order-status" class="mb-10 hidden">
            <h3 class="text-xs font-black uppercase tracking-widest text-zinc-400 mb-4">Your Active Orders</h3>
            <div id="status-list" class="flex flex-col gap-3"></div>
        </div>
        <div class="flex gap-4 overflow-x-auto no-scrollbar mb-10 pb-2" id="category-bar"></div>
        <main id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></main>
    </section>

    <section id="admin-panel" class="hidden max-w-5xl mx-auto px-5 py-10">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-4xl font-extrabold text-zinc-900">Admin</h2>
            <button onclick="location.hash=''" class="text-[10px] font-black uppercase text-zinc-400">Exit Admin</button>
        </div>
        <div class="flex gap-4 mb-8">
            <button onclick="switchAdminTab('orders')" id="tab-orders" class="px-6 py-2 rounded-full bg-zinc-900 text-white font-bold text-sm">Live Orders</button>
            <button onclick="switchAdminTab('menu')" id="tab-menu" class="px-6 py-2 rounded-full bg-zinc-100 text-zinc-400 font-bold text-sm">Manage Menu</button>
        </div>
        <div id="admin-orders-sec"><div id="admin-orders-list" class="grid gap-6"></div></div>
        <div id="admin-menu-sec" class="hidden"><div id="admin-menu-list" class="grid gap-4"></div></div>
    </section>

    <section id="admin-login-panel" class="hidden max-w-md mx-auto px-5 py-20">
        <div class="bg-white p-10 rounded-[40px] border shadow-2xl">
            <h2 class="text-2xl font-black mb-8 italic text-center">Admin Login</h2>
            <div class="space-y-4">
                <input type="text" id="admin-id" placeholder="ID" class="w-full bg-zinc-50 p-4 rounded-2xl border font-bold outline-none">
                <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-zinc-50 p-4 rounded-2xl border font-bold outline-none">
                <button onclick="handleLogin()" class="w-full bg-zinc-900 text-white py-4 rounded-2xl font-bold">Login</button>
            </div>
        </div>
    </section>

    <div id="cart-sidebar-overlay" class="hidden fixed inset-0 bg-zinc-900/60 z-[100] backdrop-blur-md transition-all" onclick="toggleCart(false)">
        <div id="cart-sidebar" class="absolute right-0 top-0 h-full w-full sm:w-[450px] bg-white shadow-2xl flex flex-col translate-x-full transition-transform duration-500" onclick="event.stopPropagation()">
            <div class="p-8 border-b flex justify-between items-center"><h2 class="text-2xl font-black">My Basket</h2><button onclick="toggleCart(false)" class="text-2xl">&times;</button></div>
            <div id="cart-content" class="flex-grow overflow-y-auto p-8 space-y-8"></div>
            <div class="p-8 bg-zinc-50 border-t">
                <input type="text" id="cust-name" placeholder="Guest Name" class="w-full bg-white p-4 rounded-2xl border mb-4 font-bold outline-none shadow-sm">
                <div class="flex justify-between items-center mb-8"><span class="font-bold text-zinc-400 text-xs">Total Bill</span><span id="cart-total-price" class="text-4xl font-black">₹0</span></div>
                <button onclick="sendOrder()" class="w-full bg-zinc-900 text-white py-5 rounded-2xl font-bold">Send to Kitchen</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bjymgwhthvwwupbisnpw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqeW1nd2h0aHZ3d3VwYmlzbnB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxNzc4MjMsImV4cCI6MjA4Mjc1MzgyM30.B3cp2YE1iYF1m7OxuzlN0NRLSzjzopgCzAI9450m_nw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. UNIQUE DEVICE ID LOGIC
        let deviceID = localStorage.getItem('cafe_device_id');
        if (!deviceID) {
            deviceID = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('cafe_device_id', deviceID);
        }

        let menuData = []; 
        let cart = [];
        let orders = [];
        let isAdminLoggedIn = false;

        const sentSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const readySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        window.addEventListener('hashchange', checkRoute);
        window.addEventListener('load', () => {
            fetchMenu();
            checkRoute();
            fetchOrders();
            setInterval(fetchOrders, 4000); 
            setInterval(fetchMenu, 10000); 
        });

        async function fetchMenu() {
            const { data, error } = await _supabase.from('menu_items').select('*').order('id', { ascending: true });
            if (!error && data) {
                menuData = data;
                renderMenu(menuData);
                renderCategoryBar();
                if(isAdminLoggedIn) renderAdminMenu();
            }
        }

        function renderMenu(items) {
            document.getElementById('menu-grid').innerHTML = items.map(item => `
                <div class="item-card bg-white rounded-[32px] p-4 border border-zinc-100 shadow-sm animate-fade ${!item.is_available ? 'opacity-50 grayscale' : ''}">
                    <img src="${item.image_url}" class="h-48 w-full object-cover rounded-[24px] mb-4">
                    <div class="px-2">
                        <p class="text-[10px] font-bold text-orange-500 uppercase mb-1">${item.category}</p>
                        <h3 class="font-extrabold text-lg text-zinc-900 mb-4">${item.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-bold">₹${item.price}</span>
                            ${item.is_available ? 
                                `<button onclick="addToCart(${item.id})" class="h-12 w-12 bg-zinc-900 text-white rounded-2xl flex items-center justify-center shadow-lg">+</button>` :
                                `<span class="text-[10px] font-black text-red-500 border border-red-100 px-3 py-1 rounded-full bg-red-50 uppercase">Sold Out</span>`
                            }
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function fetchOrders() {
            // ADMIN sees EVERYTHING, CUSTOMER sees only THEIR device_id
            let query = _supabase.from('orders').select('*').order('id', { ascending: false });
            
            if (!isAdminLoggedIn) {
                query = query.eq('device_id', deviceID);
            }

            const { data, error } = await query;
            if (!error && data) {
                data.forEach(newO => {
                    const oldO = orders.find(o => o.id === newO.id);
                    if (oldO && oldO.status === 'Pending' && newO.status === 'Ready' && !isAdminLoggedIn) { 
                        readySound.play().catch(e => {});
                        const b = document.getElementById('ready-banner'); b.classList.remove('hidden'); setTimeout(()=>b.classList.add('hidden'), 4000);
                    }
                });
                orders = data;
                renderCustomerStatus();
                if(isAdminLoggedIn) renderAdmin();
            }
        }

        async function sendOrder() {
            const name = document.getElementById('cust-name').value.trim();
            if(!name || cart.length === 0) return alert("Missing Info");
            const itemsText = cart.map(it => `${it.name} x${it.qty}${it.note ? ` (${it.note})` : ''}`).join(', ');
            const totalQty = cart.reduce((s,i) => s + i.qty, 0);

            // Save order WITH device_id
            const { error } = await _supabase.from('orders').insert([{ 
                customer_name: name, 
                item_name: itemsText, 
                quantity: totalQty, 
                status: 'Pending',
                device_id: deviceID 
            }]);

            if (!error) {
                sentSound.play().catch(e=>{}); cart = []; updateUI(); toggleCart(false);
                const b = document.getElementById('order-sent-banner'); b.classList.remove('hidden'); setTimeout(()=>b.classList.add('hidden'), 3000);
                fetchOrders();
            }
        }

        async function updateOrderStatus(id, s) { await _supabase.from('orders').update({ status: s }).eq('id', id); fetchOrders(); }

        function renderCustomerStatus() {
            const active = orders.filter(o => o.status !== 'Completed');
            document.getElementById('customer-order-status').classList.toggle('hidden', active.length === 0);
            document.getElementById('status-list').innerHTML = active.map(o => `
                <div class="bg-white border p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <div><p class="text-[10px] font-black text-zinc-400 uppercase">#ORD-${o.id}</p><p class="font-bold text-sm text-zinc-800">${o.customer_name}, order is ${o.status}</p></div>
                    <span class="px-4 py-2 rounded-full text-[10px] font-black uppercase ${o.status === 'Ready' ? 'bg-green-100 text-green-600 animate-pulse' : 'bg-orange-100 text-orange-600'}">${o.status}</span>
                </div>
            `).join('');
        }

        function renderAdmin() {
            const active = orders.filter(o => o.status !== 'Completed');
            document.getElementById('admin-orders-list').innerHTML = active.map(o => `
                <div class="bg-white p-6 rounded-[32px] border border-zinc-100 shadow-sm flex justify-between items-center animate-fade">
                    <div class="flex-grow">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-[10px] font-black px-2 py-1 bg-zinc-100 rounded-lg">#ORD-${o.id}</span>
                            <span class="text-[8px] font-bold text-zinc-400">ID: ${o.device_id || 'N/A'}</span>
                        </div>
                        <h4 class="text-xl font-black">${o.customer_name}</h4><p class="text-xs text-zinc-500 mt-2">${o.item_name}</p>
                    </div>
                    <button onclick="updateOrderStatus(${o.id}, '${o.status === 'Pending' ? 'Ready' : 'Completed'}')" class="bg-zinc-900 text-white px-6 py-4 rounded-2xl font-bold text-xs uppercase shadow-lg">${o.status === 'Pending' ? 'Ready' : 'Done'}</button>
                </div>
            `).join('');
        }

        // --- Rest of UI Functions (Kept Same) ---
        function checkRoute() {
            const h = window.location.hash;
            const isAtAdmin = h === '#admin';
            document.getElementById('customer-panel').classList.toggle('hidden', isAtAdmin);
            document.getElementById('admin-login-panel').classList.toggle('hidden', !isAtAdmin || isAdminLoggedIn);
            document.getElementById('admin-panel').classList.toggle('hidden', !isAtAdmin || !isAdminLoggedIn);
            document.getElementById('cart-trigger-btn').classList.toggle('hidden', isAtAdmin);
            if(isAdminLoggedIn && isAtAdmin) { renderAdmin(); renderAdminMenu(); toggleCart(false); }
            fetchOrders(); // Refresh based on new view
        }

        function handleLogin() {
            if (document.getElementById('admin-id').value === 'admin' && document.getElementById('admin-pass').value === '1234') {
                isAdminLoggedIn = true; checkRoute();
            } else alert("Wrong Pass");
        }

        function addToCart(id) {
            const item = menuData.find(m => m.id === id);
            const exist = cart.find(c => c.id === id);
            if(exist) exist.qty++; else cart.push({...item, qty: 1, note: ''});
            updateUI();
            const pop = document.getElementById('silent-popup'); pop.classList.remove('hidden'); setTimeout(()=>pop.classList.add('hidden'), 2000);
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.reduce((s,i) => s + i.qty, 0);
            document.getElementById('cart-content').innerHTML = cart.map((item, i) => `
                <div class="flex flex-col gap-4 border-b border-zinc-50 pb-6">
                    <div class="flex gap-4 items-center">
                        <img src="${item.image_url}" class="w-16 h-16 rounded-2xl object-cover shadow-sm">
                        <div class="flex-grow"><h4 class="font-bold text-sm">${item.name}</h4><p class="text-[10px] font-black">₹${item.price * item.qty}</p></div>
                        <div class="flex items-center gap-2"><button onclick="changeQty(${i},-1)" class="w-6 h-6 bg-zinc-100 rounded">-</button><span class="text-xs font-bold">${item.qty}</span><button onclick="changeQty(${i},1)" class="w-6 h-6 bg-zinc-900 text-white rounded">+</button></div>
                    </div>
                    <input type="text" placeholder="Extra info" onchange="cart[${i}].note=this.value" value="${item.note || ''}" class="bg-zinc-100 p-2 rounded-xl text-[10px] font-bold outline-none">
                </div>
            `).join('');
            document.getElementById('cart-total-price').innerText = `₹${cart.reduce((s,i) => s + (i.price*i.qty), 0)}`;
        }

        function changeQty(i, d) { cart[i].qty += d; if(cart[i].qty < 1) cart.splice(i, 1); updateUI(); }
        function toggleCart(s) { 
            if(s && window.location.hash === '#admin') return;
            const side = document.getElementById('cart-sidebar');
            document.getElementById('cart-sidebar-overlay').classList.toggle('hidden', !s);
            side.style.transform = s ? 'translateX(0)' : 'translateX(100%)';
        }

        function renderCategoryBar() {
            const cats = ['All', ...new Set(menuData.map(m => m.category))];
            document.getElementById('category-bar').innerHTML = cats.map(c => `<button onclick="filterMenu('${c}')" class="cat-btn ${c==='All'?'active-cat':''} px-6 py-2 rounded-full bg-white font-bold shadow-sm border whitespace-nowrap">${c}</button>`).join('');
        }

        function filterMenu(c) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
            event.target.classList.add('active-cat');
            renderMenu(c === 'All' ? menuData : menuData.filter(m => m.category === c));
        }

        function switchAdminTab(tab) {
            document.getElementById('admin-orders-sec').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('admin-menu-sec').classList.toggle('hidden', tab !== 'menu');
            document.getElementById('tab-orders').className = tab === 'orders' ? 'px-6 py-2 rounded-full bg-zinc-900 text-white font-bold text-sm' : 'px-6 py-2 rounded-full bg-zinc-100 text-zinc-400 font-bold text-sm';
            document.getElementById('tab-menu').className = tab === 'menu' ? 'px-6 py-2 rounded-full bg-zinc-900 text-white font-bold text-sm' : 'px-6 py-2 rounded-full bg-zinc-100 text-zinc-400 font-bold text-sm';
        }

        async function updateMenuField(id, field, value) {
            const { error } = await _supabase.from('menu_items').update({ [field]: value }).eq('id', id);
            if (!error) fetchMenu();
        }

        function renderAdminMenu() {
            document.getElementById('admin-menu-list').innerHTML = menuData.map(item => `
                <div class="bg-white p-5 rounded-3xl border border-zinc-100 shadow-sm flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <img src="${item.image_url}" class="w-16 h-16 rounded-2xl object-cover">
                        <div><h4 class="font-bold text-zinc-900">${item.name}</h4><p class="text-xs text-zinc-400">₹${item.price}</p></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="const p=prompt('New Price:', ${item.price}); if(p) updateMenuField(${item.id}, 'price', parseInt(p))" class="px-4 py-2 bg-zinc-100 rounded-xl text-[10px] font-black uppercase">Rate</button>
                        <button onclick="updateMenuField(${item.id}, 'is_available', ${!item.is_available})" class="px-4 py-2 ${item.is_available ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'} rounded-xl text-[10px] font-black uppercase">
                            ${item.is_available ? 'Live' : 'Hidden'}
                        </button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
